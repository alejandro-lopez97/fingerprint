<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: Arial, sans-serif;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #357ae8;
    }
    .info {
      margin-top: 16px;
      font-size: 12px;
      color: #666;
    }
    .info-item {
      margin: 8px 0;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    .label {
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <button id="generateBtn">🔄 New Fingerprint</button>
  <div class="info" id="fingerprintInfo"></div>
  <script src="popup.js"></script>
</body>
</html>
